{% extends 'superadmi/base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-11">
            <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                <div class="card-header bg-white p-4" style="border-bottom: 1px solid #f0f2f5;">
                    <h4 class="m-0" style="color: #33475b; font-weight: 700;">
                        <i class="fa fa-user-plus text-warning me-2"></i> Registrar Personal de Salud
                    </h4>
                </div>
                
                <form method="POST" action="{% url 'superadmin:listar_usuarios' %}" class="p-4">
                    {% csrf_token %}
                    
                    <div class="row">
                        {% for field in form %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="color: #7c98b6; font-size: 12px; font-weight: 700; text-transform: uppercase;">
                                {{ field.label }}
                            </label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger" style="font-size: 11px;">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div class="d-flex justify-content-end mt-4 pt-3" style="border-top: 1px solid #f0f2f5;">
                        <a href="{% url 'superadmin:listar_usuarios' %}" class="btn btn-light px-4 me-2" style="border-radius: 8px;">Cancelar</a>
                        <button type="submit" class="btn px-5 text-white" style="background: #ff9800; border-radius: 8px; font-weight: 700;">
                            Guardar Personal
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Aseguramos que los campos de Django se vean bien */
    input, select, textarea {
        display: block; width: 100%; padding: 0.375rem 0.75rem;
        font-size: 1rem; border: 1px solid #dee2e6 !important;
        border-radius: 8px !important;
    }
    input:focus, select:focus {
        border-color: #ff9800 !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 152, 0, 0.1) !important;
        outline: none;
    }
</style>
{% endblock %}
