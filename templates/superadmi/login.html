{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            background: white; padding: 50px; border-radius: 20px; width: 100%; max-width: 420px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-control { 
            background: #f8fafd !important; border: 1px solid #e3e8ee; color: #33475b !important; margin-bottom: 20px; height: 50px; border-radius: 10px;
        }
        .form-control:focus { border-color: #ff9800; box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1); }
        .btn-ingresar {
            background: #ff9800; border: none; height: 50px; border-radius: 10px; color: white; font-weight: 700; font-size: 16px; width: 100%; transition: all 0.3s;
            cursor: pointer;
        }
        .btn-ingresar:hover { background: #e68900; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,152,0,0.3); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="mb-4">
            <h2 style="color: #33475b; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px;">HOSPITAL</h2>
            <p style="color: #7c98b6; font-size: 14px;">Ingresa tus credenciales para continuar</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2" style="border-radius: 10px; font-size: 13px;">
                    <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'superadmin:login' %}">
            {% csrf_token %}
            <div class="text-start mb-1">
                <label style="font-size: 12px; color: #7c98b6; font-weight: 600; text-transform: uppercase; margin-left: 5px;">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="text-start mb-2">
                <label style="font-size: 12px; color: #7c98b6; font-weight: 600; text-transform: uppercase; margin-left: 5px;">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-ingresar mt-2">INICIAR SESIÓN</button>
        </form>
        
        <div class="mt-4">
            <small class="text-muted">¿Problemas para entrar? Contacta al soporte.</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
