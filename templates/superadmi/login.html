{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .login-card { 
            background: white; padding: 45px; border-radius: 25px; width: 100%; max-width: 420px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hospital-logo {
            width: 80px; margin-bottom: 20px;
        }
        .form-control { 
            background: #f8fafd !important; border: 1px solid #e3e8ee; color: #33475b !important; 
            margin-bottom: 15px; height: 50px; border-radius: 12px; font-size: 15px;
        }
        .form-control:focus { 
            border-color: #ff9800; box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1); 
        }
        .btn-ingresar {
            background: #ff9800; border: none; height: 50px; border-radius: 12px; 
            color: white; font-weight: 700; font-size: 16px; width: 100%; 
            transition: all 0.3s ease; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-ingresar:hover { 
            background: #e68900; transform: translateY(-2px); 
            box-shadow: 0 8px 15px rgba(255,152,0,0.3); 
        }
        .btn-ingresar:active { transform: translateY(0); }
        
        .alert {
            border-radius: 12px; border: none; font-size: 14px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 rounded-circle mb-3" style="width: 70px; height: 70px;">
                <i class="fas fa-hospital-user fa-2x text-warning"></i>
            </div>
            <h2 style="color: #33475b; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px;">SISTEMA HOSPITAL</h2>
            <p style="color: #7c98b6; font-size: 14px;">Panel de Mando y Control</p>
        </div>

        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} d-flex align-items-center shadow-sm" role="alert">
                        <i class="fas {% if message.tags == 'error' %}fa-times-circle{% else %}fa-check-circle{% endif %} me-2"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'superadmin:login' %}" autocomplete="off">
            {% csrf_token %} <div class="text-start mb-1">
                <label class="ms-2 mb-1" style="font-size: 11px; color: #7c98b6; font-weight: 700; text-transform: uppercase;">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px; border-color: #e3e8ee;">
                        <i class="fas fa-user text-muted"></i>
                    </span>
                    <input type="text" name="username" class="form-control border-start-0" 
                           style="border-radius: 0 12px 12px 0;" placeholder="Ingrese su usuario" required autofocus>
                </div>
            </div>

            <div class="text-start mb-3">
                <label class="ms-2 mb-1" style="font-size: 11px; color: #7c98b6; font-weight: 700; text-transform: uppercase;">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px; border-color: #e3e8ee;">
                        <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input type="password" name="password" class="form-control border-start-0" 
                           style="border-radius: 0 12px 12px 0;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-ingresar mt-2 shadow">
                Entrar al Sistema <i class="fas fa-sign-in-alt ms-2"></i>
            </button>
        </form>
        
        <div class="mt-4 pt-2 border-top">
            <small class="text-muted">Gobierno Autónomo Departamental de Potosí</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
